name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          # CPU torch keeps CI installs small & fast
          pip install --extra-index-url https://download.pytorch.org/whl/cpu torch
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check vektor tests scripts

      - name: Type-check
        run: mypy vektor || true  # advisory until coverage stabilizes

      - name: Test
        run: pytest --cov=vektor --cov-report=term-missing

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t vektor:ci .
